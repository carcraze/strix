name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_PROJECT: moyopal-453021
  GCP_REGION: us-central1
  BACKEND_IMAGE: us-central1-docker.pkg.dev/moyopal-453021/zentinel-backend/zentinel-api
  FRONTEND_IMAGE: gcr.io/moyopal-453021/zentinel-frontend

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'strix/**'
              - 'pyproject.toml'
            frontend:
              - 'frontend/**'

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            -f backend/Dockerfile .

      - name: Push backend image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy zentinel-api \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --quiet

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_POSTHOG_TOKEN=${{ secrets.NEXT_PUBLIC_POSTHOG_TOKEN }} \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }} \
            --build-arg NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} \
            --build-arg SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            --build-arg WORKOS_CLIENT_ID=${{ secrets.WORKOS_CLIENT_ID }} \
            --build-arg WORKOS_API_KEY=${{ secrets.WORKOS_API_KEY }} \
            --build-arg GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }} \
            --build-arg GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }} \
            --build-arg GITLAB_CLIENT_ID=${{ secrets.GITLAB_CLIENT_ID }} \
            --build-arg GITLAB_CLIENT_SECRET=${{ secrets.GITLAB_CLIENT_SECRET }} \
            --build-arg BITBUCKET_CLIENT_ID=${{ secrets.BITBUCKET_CLIENT_ID }} \
            --build-arg BITBUCKET_CLIENT_SECRET=${{ secrets.BITBUCKET_CLIENT_SECRET }} \
            --build-arg DODO_PAYMENTS_API_KEY=${{ secrets.DODO_PAYMENTS_API_KEY }} \
            --build-arg DODO_WEBHOOK_SECRET=${{ secrets.DODO_WEBHOOK_SECRET }} \
            --build-arg SCANNER_BACKEND_URL=${{ secrets.SCANNER_BACKEND_URL }} \
            --build-arg GITHUB_WEBHOOK_SECRET=${{ secrets.GITHUB_WEBHOOK_SECRET }} \
            --build-arg GITLAB_WEBHOOK_SECRET=${{ secrets.GITLAB_WEBHOOK_SECRET }} \
            --build-arg BITBUCKET_WEBHOOK_SECRET=${{ secrets.BITBUCKET_WEBHOOK_SECRET }} \
            frontend/

      - name: Push frontend image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy zentinel-frontend \
            --image=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --port=3000 \
            --quiet
