steps:
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '--tag', 'gcr.io/moyopal-453021/zentinel-frontend',
    '--build-arg', 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}',
    '--build-arg', 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}',
    '--build-arg', 'NEXT_PUBLIC_POSTHOG_TOKEN=${_NEXT_PUBLIC_POSTHOG_TOKEN}',
    '--build-arg', 'NEXT_PUBLIC_POSTHOG_HOST=${_NEXT_PUBLIC_POSTHOG_HOST}',
    '--build-arg', 'NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}',
    '--build-arg', 'NEXT_PUBLIC_SCANNER_BACKEND_URL=${_NEXT_PUBLIC_SCANNER_BACKEND_URL}',
    '--build-arg', 'WORKOS_CLIENT_ID=${_WORKOS_CLIENT_ID}',
    '--build-arg', 'WORKOS_API_KEY=${_WORKOS_API_KEY}',
    '--build-arg', 'SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY}',
    '--build-arg', 'GITHUB_CLIENT_ID=${_GITHUB_CLIENT_ID}',
    '--build-arg', 'GITHUB_CLIENT_SECRET=${_GITHUB_CLIENT_SECRET}',
    '--build-arg', 'GITLAB_CLIENT_ID=${_GITLAB_CLIENT_ID}',
    '--build-arg', 'GITLAB_CLIENT_SECRET=${_GITLAB_CLIENT_SECRET}',
    '--build-arg', 'BITBUCKET_CLIENT_ID=${_BITBUCKET_CLIENT_ID}',
    '--build-arg', 'BITBUCKET_CLIENT_SECRET=${_BITBUCKET_CLIENT_SECRET}',
    '--build-arg', 'DODO_PAYMENTS_API_KEY=${_DODO_PAYMENTS_API_KEY}',
    '--build-arg', 'DODO_WEBHOOK_SECRET=${_DODO_WEBHOOK_SECRET}',
    '--build-arg', 'SCANNER_BACKEND_URL=${_SCANNER_BACKEND_URL}',
    '--build-arg', 'GITHUB_WEBHOOK_SECRET=${_GITHUB_WEBHOOK_SECRET}',
    '--build-arg', 'GITLAB_WEBHOOK_SECRET=${_GITLAB_WEBHOOK_SECRET}',
    '--build-arg', 'BITBUCKET_WEBHOOK_SECRET=${_BITBUCKET_WEBHOOK_SECRET}',
    '.'
  ]
images:
- 'gcr.io/moyopal-453021/zentinel-frontend'
